interface_contracts:
    - name: testGetDocumentSymbols
      description: Tests get_document_symbols tool; asserts result is non-empty array containing Person type entry
      definition: |
        async function testGetDocumentSymbols(client, lang) {
          // Calls get_document_symbols with { file_path: lang.file }
          // Returns { tool: 'get_document_symbols', status: 'pass'|'skip'|'fail', detail: string }
          // Assert: result.content[0].text parses to non-empty array containing
          //   an entry whose name matches lang.symbolName (e.g. 'Person')
        }
      location: test/multi-lang.test.js
    - name: testGoToDefinition
      description: Tests go_to_definition; called at call site, asserts result URI and line match definition
      definition: |
        async function testGoToDefinition(client, lang) {
          // Calls go_to_definition with {
          //   file_path: lang.file,
          //   language_id: lang.id,
          //   line: lang.callSiteLine,
          //   column: lang.callSiteColumn
          // }
          // Returns { tool: 'go_to_definition', status: 'pass'|'skip'|'fail', detail: string }
          // Assert: result URI ends with expected filename and range.start.line === lang.definitionLine - 1
          //   (LSP uses 0-indexed lines internally, but lang config stores 1-indexed)
        }
      location: test/multi-lang.test.js
    - name: testGetReferences
      description: Tests get_references on Person type; asserts count >= 2 when secondFile exists
      definition: |
        async function testGetReferences(client, lang) {
          // Must open lang.secondFile via open_document first if lang.secondFile is defined
          // Calls get_references with {
          //   file_path: lang.file,
          //   language_id: lang.id,
          //   line: lang.referenceLine,
          //   column: lang.referenceColumn,
          //   include_declaration: true
          // }
          // Returns { tool: 'get_references', status: 'pass'|'skip'|'fail', detail: string }
          // Assert: result length >= 2 if lang.secondFile, else >= 1
        }
      location: test/multi-lang.test.js
    - name: testGetCompletions
      description: Tests get_completions; asserts result is non-empty array
      definition: |
        async function testGetCompletions(client, lang) {
          // Calls get_completions with {
          //   file_path: lang.file,
          //   language_id: lang.id,
          //   line: lang.completionLine,
          //   column: lang.completionColumn
          // }
          // Returns { tool: 'get_completions', status: 'pass'|'skip'|'fail', detail: string }
          // Assert: result.content[0].text parses to non-empty array
        }
      location: test/multi-lang.test.js
    - name: testGetWorkspaceSymbols
      description: Tests get_workspace_symbols with query 'Person'; asserts result contains entry named Person
      definition: |
        async function testGetWorkspaceSymbols(client, lang) {
          // Calls get_workspace_symbols with { query: lang.workspaceSymbolQuery }
          // Returns { tool: 'get_workspace_symbols', status: 'pass'|'skip'|'fail', detail: string }
          // Assert: result contains an entry whose name matches lang.workspaceSymbolQuery
          //   (for Go, match 'type Person struct' or just contains 'Person')
        }
      location: test/multi-lang.test.js
    - name: testFormatDocument
      description: Capability-gated format_document test; skips if serverCapabilities.documentFormattingProvider is falsy
      definition: |
        async function testFormatDocument(client, lang) {
          // Skip if lang.supportsFormatting === false
          // Calls format_document with { file_path: lang.file, language_id: lang.id }
          // Returns { tool: 'format_document', status: 'pass'|'skip'|'fail', detail: string }
          // Assert: result is array (possibly empty); no error thrown
