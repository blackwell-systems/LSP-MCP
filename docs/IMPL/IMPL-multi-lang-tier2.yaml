          task: |-
            ## Task: Create Go greeter fixture file

            Create `test/fixtures/go/greeter.go` — a second Go source file in the same
            `package main` that imports the `Person` type defined in `main.go`.

            ### File to create: test/fixtures/go/greeter.go

            ```go
            package main

            import "fmt"

            // Greeter wraps a Person and produces greetings.
            type Greeter struct {
                person Person
            }

            func NewGreeter(p Person) Greeter {
                return Greeter{person: p}
            }

            func (g Greeter) SayHello() string {
                return fmt.Sprintf("Greeter says: %s", g.person.Greet())
            }
            ```

            This file references `Person` at lines 7 (struct field), 11 (parameter), and
            14 (method receiver context). Combined with main.go line 6 (definition) and
            line 21 (usage), get_references on `Person` should return 5+ locations.

            ### Verification
            - Run: `ls test/fixtures/go/` — should show both `main.go` and `greeter.go`
            - Run: `grep -n "Person" test/fixtures/go/greeter.go` — should show lines 7, 11, 14

            ### Constraints
            - Do NOT modify test/fixtures/go/main.go
            - Do NOT modify test/multi-lang.test.js
          files:
            - test/fixtures/go/greeter.go
        - id: B
