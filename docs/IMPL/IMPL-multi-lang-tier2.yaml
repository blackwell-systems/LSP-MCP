          // Opens person.h via open_document
          // Calls go_to_declaration with {
          //   file_path: lang.file,  // person.c
          //   language_id: 'c',
          //   line: lang.declarationLine,
          //   column: lang.declarationColumn
          // }
          // Returns { tool: 'go_to_declaration', status: 'pass'|'skip'|'fail', detail: string }
          // Assert: result URI ends with 'person.h'
        }
      location: test/multi-lang.test.js
    - name: LanguageConfig
      description: Extended language config object — new fields added to each LANGUAGES entry
      definition: |
        {
          // Existing Tier 1 fields (unchanged):
          name, id, binary, serverArgs, fixture, file, hoverLine, hoverColumn,

          // New Tier 2 fields:
          definitionLine: number,    // 1-indexed line of add() function definition
          definitionColumn: number,  // 1-indexed column of add() identifier
          callSiteLine: number,      // 1-indexed line of add() call site
          callSiteColumn: number,    // 1-indexed column of add() call site
          referenceLine: number,     // 1-indexed line of Person type identifier (for get_references)
          referenceColumn: number,   // 1-indexed column of Person identifier
          completionLine: number,    // 1-indexed line for get_completions trigger (after dot/paren)
          completionColumn: number,  // 1-indexed column for get_completions trigger
          workspaceSymbolQuery: string,  // e.g. 'Person'
          supportsFormatting: boolean,   // false for Python, PHP (capability-gated)
          secondFile?: string,           // absolute path to cross-file fixture (for get_references)
          symbolName: string,            // expected symbol name in get_document_symbols result
          // C-only:
          declarationLine?: number,      // line in person.c referencing greet_person (for go_to_declaration)
          declarationColumn?: number,    // column for go_to_declaration
        }
      location: test/multi-lang.test.js
