        - id: F
          task: |-
            ## Task: Refactor C fixture to header + greeter structure

            The C fixture currently has a single `person.c` file. Refactor it into a
            proper header/implementation split so clangd can support `go_to_declaration`
            (which navigates from implementation to header declaration).

            ### Step 1: Create test/fixtures/c/person.h

            ```c
            #ifndef PERSON_H
            #define PERSON_H

            /**
             * A simple person struct with greeting functionality.
             */
            typedef struct {
                char *name;
                int age;
            } Person;

            /**
             * Create a person with the given name and age.
             */
            Person create_person(const char *name, int age);

            int add(int x, int y);

            #endif /* PERSON_H */
            ```

            ### Step 2: Modify test/fixtures/c/person.c

            Replace the entire content with:

            ```c
            #include "person.h"

            Person create_person(const char *name, int age) {
                Person p;
                p.name = (char *)name;
                p.age = age;
                return p;
            }

            int add(int x, int y) {
                return x + y;
            }

            int main(void) {
                Person p = create_person("Alice", 30);
                return add(1, 2);
            }
            ```

            Note: The typedef struct and function declarations are now only in person.h.
            person.c includes person.h and provides the implementations.

            ### Step 3: Create test/fixtures/c/greeter.c

            ```c
            #include "person.h"
            #include <stdio.h>

            void greet_person(Person p) {
                printf("Greeter says: Hello, %s\n", p.name);
            }
            ```

            `go_to_declaration` on `greet_person` in greeter.c won't apply here, but
            `go_to_declaration` on `Person` in person.c will resolve to person.h line 7
            (the typedef struct declaration).

            ### Step 4: Create test/fixtures/c/compile_commands.json

            ```json
            [
              {
                "directory": "/placeholder",
                "command": "cc -std=c11 person.c greeter.c -o person",
                "file": "person.c"
              },
              {
                "directory": "/placeholder",
                "command": "cc -std=c11 person.c greeter.c -o person",
                "file": "greeter.c"
              }
            ]
            ```

            Note: The `directory` field is a placeholder. Clangd uses compile_commands.json
            to understand the compile graph. The fixture directory path doesn't need to be
            exact — clangd will resolve includes relative to the file's actual location.
            The important thing is that both files are listed so clangd indexes both.

            ### Position metadata for person.c after refactor:
            - `add` defined at line 11 (0-indexed: 10), col 5 (0-indexed: 4)
            - `add(1, 2)` call site at line 16 (0-indexed: 15), col 12 (0-indexed: 11)
