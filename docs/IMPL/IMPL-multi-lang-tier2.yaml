            - Run: `grep -n "#include" test/fixtures/c/person.c` — should show `#include "person.h"`
            - Run: `grep -n "Person" test/fixtures/c/person.h` — should show typedef and declaration
            - Run: `grep -n "Person" test/fixtures/c/greeter.c` — should show parameter type

            ### Constraints
