interface_contracts:
    - name: applyWorkspaceEdit
      description: |-
        Applies a WorkspaceEdit directly to disk without going through LSP server.
        Iterates workspaceEdit.changes (URI -> TextEdit[]) or workspaceEdit.documentChanges
        (TextDocumentEdit[]). For each file: reads file content, applies edits in
        reverse line order (bottom-to-top to preserve offsets), writes file back to
        disk, then calls openDocument() to send textDocument/didChange so the LSP
        server sees the updated content. Returns void; throws on fs error.
      definition: |
        async applyWorkspaceEdit(workspaceEdit: any): Promise<void>
      location: src/lspClient.ts
    - name: getDeclaration
      description: |-
        LSP textDocument/declaration — navigate to the original declaration of a symbol
        (e.g., forward declaration in C/C++). Same shape as getDefinition: normalizes
        LocationLink[] to Location[]. Returns empty array if server does not declare
        declarationProvider capability.
        Capability key: serverCapabilities.declarationProvider
      definition: |
        async getDeclaration(
          uri: string,
          position: { line: number; character: number },
        ): Promise<Array<{ uri: string; range: { start: { line: number; character: number }; end: { line: number; character: number } } }>>
      location: src/lspClient.ts
    - name: prepareRename
      description: |-
        LSP textDocument/prepareRename — validates that a rename is possible at the given
        position before committing to rename_symbol. Returns Range, { range, placeholder },
        { defaultBehavior: boolean }, or null. Returns null if rename is not supported at
        this position or if server does not support prepareRename.
        Capability key: serverCapabilities.renameProvider.prepareProvider (or
        serverCapabilities.renameProvider === true for basic rename without prepare support).
        If the server only has basic renameProvider (not an object with prepareProvider),
        return null to indicate prepare is not supported.
      definition: |
        async prepareRename(
          uri: string,
          position: { line: number; character: number },
        ): Promise<any | null>
      location: src/lspClient.ts
