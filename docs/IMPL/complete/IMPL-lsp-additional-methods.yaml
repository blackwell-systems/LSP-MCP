interface_contracts:
    - name: getTypeDefinition
      description: |-
        LSP textDocument/typeDefinition — returns locations where the type of a symbol
        is defined. Same shape as getDefinition: normalizes LocationLink[] to Location[].
        Capability key: serverCapabilities.typeDefinitionProvider.
      definition: |
        async getTypeDefinition(
          uri: string,
          position: { line: number; character: number },
        ): Promise<Array<{ uri: string; range: { start: { line: number; character: number }; end: { line: number; character: number } } }>>
      location: src/lspClient.ts
    - name: getImplementation
      description: |-
        LSP textDocument/implementation — returns locations where an interface or abstract
        symbol is implemented. Same shape as getDefinition: normalizes LocationLink[] to
        Location[]. Capability key: serverCapabilities.implementationProvider.
      definition: |
        async getImplementation(
          uri: string,
          position: { line: number; character: number },
        ): Promise<Array<{ uri: string; range: { start: { line: number; character: number }; end: { line: number; character: number } } }>>
      location: src/lspClient.ts
    - name: executeCommand
      description: |-
        LSP workspace/executeCommand — executes a server-defined command by name with
        optional arguments. Used to invoke commands returned by code actions.
        Capability key: serverCapabilities.executeCommandProvider.
        Returns the server-defined result or null.
      definition: |
        async executeCommand(
          command: string,
          args?: any[],
        ): Promise<any | null>
      location: src/lspClient.ts
