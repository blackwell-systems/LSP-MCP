suitability_assessment: |
    All three LSP methods are absent from both src/lspClient.ts and src/tools/index.ts.
    Each method follows the identical pattern established by existing methods:
    (1) capability check, (2) sendRequest<T>, (3) Zod schema in types/index.ts,
    (4) named handler function in tools/index.ts, (5) entry in getToolHandlers and
    getToolDefinitions. No investigation is needed; the pattern is fully defined.

    getTypeDefinition and getImplementation are identical in shape to getDefinition —
    they return Location | Location[] | LocationLink[] and use the same normalization
    pattern. executeCommand is workspace-scoped (no file URI) and returns any | null.

    Client capability declarations for typeDefinition: {} and implementation: {} are
    ALREADY present in initialize() from the previous wave. No capability changes needed
    in Wave 1 — Agent A only adds 3 LSP client methods.

    File decomposition is clean: Agent A owns src/lspClient.ts (adds 3 LSP client
    methods); Agent B owns src/types/index.ts and src/tools/index.ts (adds schemas,
    handlers, registrations, and tool definitions). No file is shared between agents.

    The 2-wave structure (A: lspClient.ts only, B: types+tools only) is required —
    single-wave caused wave_structure validation failures in the prior IMPL.

    Estimated times:
    - Scout phase: ~15 min (codebase analysis + IMPL doc)
    - Agent execution: ~20 min (2 agents x ~10 min avg, running in parallel)
    - Merge and verification: ~5 min
    Total SAW time: ~40 min

    Sequential baseline: ~25 min (2 agents x ~12 min sequential)
    Time savings: ~5 min parallel benefit; also provides interface spec as audit trail.

    Recommendation: Proceed with parallel execution.
